# Deja que Nixpacks detecte PHP + Composer automáticamente.
# Solo agregamos extensiones PostgreSQL y el build de Vite.

[variables]
NIXPACKS_PHP_EXTENSIONS = "pdo_pgsql,pgsql,mbstring,bcmath,xml,curl,zip,fileinfo"
NIXPACKS_PHP_ROOT_DIR = "/app/public"

[phases.build]
cmds = [
  "npm ci",
  "npm run build",
]
