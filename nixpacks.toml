# PHP + Composer: detección automática de Nixpacks.
# Node 22: requerido por Vite 7.

[variables]
NIXPACKS_PHP_EXTENSIONS = "pdo_pgsql,pgsql,mbstring,bcmath,xml,curl,zip,fileinfo"
NIXPACKS_PHP_ROOT_DIR = "/app/public"
NIXPACKS_NODE_VERSION = "22"

[phases.build]
cmds = [
  "npm run build",
  "chmod +x scripts/start-nginx-fpm.sh scripts/railway-start.sh",
]
