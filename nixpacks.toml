[phases.setup]
nixPkgs = ["php82", "php82Extensions.pdo_pgsql", "php82Extensions.pgsql", "php82Extensions.mbstring", "php82Extensions.bcmath", "php82Extensions.xml", "php82Extensions.curl", "php82Extensions.zip", "php82Extensions.fileinfo", "nodejs_22"]

[phases.install]
cmds = [
  "composer install --no-dev --optimize-autoloader --no-interaction",
  "npm install",
  "npm run build",
]

[phases.build]
cmds = [
  "mkdir -p storage/framework/{cache,sessions,views} storage/app/public storage/logs bootstrap/cache",
  "chmod -R 775 storage bootstrap/cache || true",
]

[start]
cmd = "bash scripts/railway-start.sh"
